<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>if(!localStorage.getItem('luxus_wc_user'))location.replace('welcome.html');</script>
  <title>Company Tracker — Luxus WC 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0e1b2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Luxus WC">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>

<header>
  <div class="container">
    <div class="header-inner">
      <div class="site-title">⚽ <span>Luxus WC 2026</span></div>
      <nav>
        <a href="dashboard.html">My Teams</a>
        <a href="index.html" class="active">Tracker</a>
        <a href="bracket.html">Bracket</a>
        <a href="groups.html">Groups</a>
        <a href="leaderboard.html">Leaderboard</a>
      </nav>
      <div class="nav-user">
        <span class="nav-user-name" id="nav-name"></span>
        <a href="#" id="nav-logout" class="nav-logout">Not you?</a>
      </div>
      <button class="nav-toggle" id="nav-toggle" aria-label="Menu" aria-expanded="false">☰</button>
    </div>
    <nav class="nav-drawer" id="nav-drawer">
      <a href="dashboard.html">My Teams</a>
      <a href="index.html" class="active">Tracker</a>
      <a href="bracket.html">Bracket</a>
      <a href="groups.html">Groups</a>
      <a href="leaderboard.html">Leaderboard</a>
      <div class="nav-drawer-user">
        <span class="nav-drawer-name" id="nav-drawer-name"></span>
        <a href="#" id="nav-drawer-logout" class="nav-logout">Sign out</a>
      </div>
    </nav>
  </div>
</header>

<main>
  <div class="container">

    <div class="status-bar">
      <span id="status-pill" class="status-pill status-loading">Loading…</span>
      <button id="refresh-btn" class="btn" title="Reload data from API">↻ Refresh</button>
    </div>

    <div id="error-notice" class="error-notice hidden"></div>

    <div class="controls">
      <div class="sort-buttons" role="group" aria-label="Sort options">
        <button class="sort-btn active" data-view="person">Person A–Z</button>
        <button class="sort-btn" data-view="team">Team A–Z</button>
        <button class="sort-btn" data-view="group">By Group</button>
        <button class="sort-btn" data-view="points">By Points</button>
      </div>
      <input type="search" id="search" class="search-input" placeholder="Search person or team…" autocomplete="off">
    </div>

    <div id="group-sections"></div>
    <div id="cards-grid" class="cards-grid"></div>

  </div>
</main>

<footer>
  <div class="container">
    <div class="footer-inner">
      <span id="version-display"></span>
      <nav style="margin:0">
        <a href="dashboard.html">My Teams</a>
        <a href="bracket.html">Bracket</a>
        <a href="groups.html">Groups</a>
        <a href="leaderboard.html">Leaderboard</a>
      </nav>
    </div>
  </div>
</footer>

<script src="js/version.js"></script>
<script src="js/flags.js"></script>
<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/settings.js"></script>
<script src="js/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luxus World Cup 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0e1b2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Luxus WC">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body class="welcome-page">

<div class="welcome-wrap">

  <section class="upcoming-fixtures" id="upcoming-fixtures">
    <div class="upcoming-label">Upcoming Fixtures</div>
    <div class="fixtures-scroll" id="fixtures-scroll">
      <div class="wf-empty">Loading fixtures…</div>
    </div>
  </section>

  <div class="welcome-card">
    <div class="welcome-trophy">🏆</div>
    <h1 class="welcome-title">Luxus World Cup 2026</h1>
    <p class="welcome-tagline">Sweepstakes Tracker</p>
    <input
      type="text"
      id="name-input"
      class="welcome-input"
      placeholder="Enter your name to continue"
      autocomplete="off"
      spellcheck="false"
    >
    <button id="continue-btn" class="welcome-btn">Continue →</button>
    <div id="welcome-error" class="welcome-error hidden">Name not recognised — are you in the sweepstake?</div>
  </div>
  <div class="welcome-version" id="version-display"></div>
</div>

<script src="js/version.js"></script>
<script src="js/flags.js"></script>
<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/welcome.js"></script>
<script src="js/welcome-fixtures.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
</body>
</html>
